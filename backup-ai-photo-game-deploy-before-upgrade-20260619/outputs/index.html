<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI照片分辨游戏</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">每日挑战</p>
          <h1>AI照片分辨游戏</h1>
          <p class="tagline">看看今天你的眼睛有没有被 AI 绕进去。</p>
        </div>
        <div class="hero-side">
          <div class="date-card">
            <span>今日日期</span>
            <strong id="todayText">--</strong>
          </div>
          <button id="archiveBtn" class="archive-btn" type="button">往期题目</button>
        </div>
      </header>

      <section id="emptyState" class="empty-state hidden">
        <h2 id="emptyTitle">今日暂无题目，请明天再来</h2>
        <p id="emptyText">出题人还在挑图中。先让眼睛休息一下。</p>
      </section>

      <section id="archivePanel" class="archive-panel hidden">
        <div class="archive-head">
          <div>
            <h2>往期题目</h2>
            <p>翻一翻之前的挑战，看看当时的眼力还在线吗。</p>
          </div>
        </div>
        <div id="archiveList" class="archive-list"></div>
      </section>

      <section id="quizPanel" class="quiz-panel hidden">
        <div class="question-head">
          <div>
            <span id="typeBadge" class="type-badge">单选</span>
            <h2 id="questionTitle">今日题目</h2>
            <p id="questionDescription"></p>
          </div>
          <p id="answeredNote" class="answered-note hidden">你今天已经答过啦，结果已为你保留。</p>
        </div>

        <div id="imageGrid" class="image-grid" aria-live="polite"></div>

        <div class="actions">
          <button id="submitBtn" class="submit-btn" type="button">提交答案</button>
          <p id="selectionHint" class="selection-hint">点图片放大，点卡片下方选择</p>
        </div>

        <section id="resultPanel" class="result-panel hidden" aria-live="polite">
          <div id="resultSummary" class="result-summary"></div>
          <div id="answerList" class="answer-list"></div>
        </section>
      </section>
    </main>

    <div id="previewModal" class="preview-modal hidden" aria-hidden="true">
      <div class="preview-content" role="dialog" aria-modal="true" aria-label="图片放大预览">
        <button id="previewCloseBtn" class="preview-close-btn" type="button" aria-label="关闭预览">×</button>
        <img id="previewImage" src="" alt="" />
        <p id="previewCaption" class="preview-caption"></p>
      </div>
    </div>

    <footer class="footer">本游戏仅供娱乐与视觉观察训练</footer>

    <script src="questions.js"></script>
    <script src="script.js"></script>
  </body>
</html>
